name: Daily Amazon update

on:
  schedule:
    # GitHub-cron draait in UTC en kent geen zomer/wintertijd. Twee regels houden
    # het jaarrond op 12:01 NL (net na de update van 12:00 stipt):
    - cron: '1 10 * * *'   # 12:01 in zomertijd (CEST, UTC+2)
    - cron: '1 11 * * *'   # 12:01 in wintertijd (CET, UTC+1)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Excel bouwen
        run: python update_amazon.py

      - name: LibreOffice installeren
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-calc

      - name: Formules doorrekenen en waarden inbakken
        run: |
          mkdir -p ~/.config/libreoffice/4/user
          cat > ~/.config/libreoffice/4/user/registrymodifications.xcu << 'XCU'
          <?xml version="1.0" encoding="UTF-8"?>
          <oor:items xmlns:oor="http://openoffice.org/2001/registry" xmlns:xs="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
           <item oor:path="/org.openoffice.Office.Calc/Formula/Load"><prop oor:name="ODFRecalcMode" oor:op="fuse"><value>0</value></prop></item>
           <item oor:path="/org.openoffice.Office.Calc/Formula/Load"><prop oor:name="OOXMLRecalcMode" oor:op="fuse"><value>0</value></prop></item>
          </oor:items>
          XCU
          rm -rf _recalc && mkdir _recalc
          soffice --headless --calc --convert-to xlsx --outdir _recalc output/*.xlsx
          cp _recalc/*.xlsx output/
          rm -rf _recalc

      - name: Data en Excel versleutelen
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python encrypt_site.py

      - name: Commit output (alleen ciphertext)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output/
          git diff --staged --quiet || (git commit -m "Amazon data update $(date -u +%Y-%m-%d)" && git push)

      - name: Site klaarzetten
        run: |
          mkdir -p _site/output
          cp index.html _site/
          cp output/*.enc _site/output/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
