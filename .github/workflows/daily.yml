name: Daily Amazon update

on:
  schedule:
    # 11:30 UTC = 12:30 CET (winter) / 13:30 CEST (zomer), dus altijd na de update van 12:00
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Excel bouwen
        run: python update_amazon.py

      - name: Commit output (voor historie + lokale git pull)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "Amazon data update $(date -u +%Y-%m-%d)" && git push)

      - name: Site klaarzetten
        run: |
          mkdir -p _site/output
          cp index.html _site/
          cp -r output/* _site/output/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
