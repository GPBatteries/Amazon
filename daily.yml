name: Daily Amazon update

on:
  schedule:
    # 11:30 UTC = 12:30 CET (winter) / 13:30 CEST (zomer), dus altijd na de update van 12:00
    - cron: '30 11 * * *'
  workflow_dispatch:        # handmatig draaien via de Actions-tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Excel bouwen
        run: python update_amazon.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen."
          else
            git commit -m "Amazon data update $(date -u +%Y-%m-%d)"
            git push
          fi
