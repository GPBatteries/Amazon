name: Daily Amazon update (SP-API)

# Testversie die dezelfde stappen doorloopt als "Daily Amazon update", maar de
# data ophaalt via de SP-API (fetch_spapi_daily.py) in plaats van de Google
# Sheet. Draai deze eerst een aantal dagen los naast de bestaande daily.yml
# om te controleren of de cijfers kloppen, voordat je 'm de bestaande
# workflow laat vervangen.

on:
  # Triggeren gebeurt extern via cron-job.org (workflow_dispatch), net als
  # bij de bestaande "Daily Amazon update".
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Sales/traffic van gisteren ophalen via SP-API
        env:
          LWA_CLIENT_ID: ${{ secrets.LWA_CLIENT_ID }}
          LWA_CLIENT_SECRET: ${{ secrets.LWA_CLIENT_SECRET }}
          SPAPI_REFRESH_TOKEN: ${{ secrets.SPAPI_REFRESH_TOKEN }}
        run: python fetch_spapi_daily.py

      - name: Excel bouwen (uit spapi_history.csv)
        env:
          DATA_SOURCE: spapi
        run: python update_amazon.py

      - name: LibreOffice installeren
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-calc

      - name: Formules doorrekenen en waarden inbakken
        run: |
          mkdir -p ~/.config/libreoffice/4/user
          cat > ~/.config/libreoffice/4/user/registrymodifications.xcu << 'XCU'
          <?xml version="1.0" encoding="UTF-8"?>
          <oor:items xmlns:oor="http://openoffice.org/2001/registry" xmlns:xs="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
           <item oor:path="/org.openoffice.Office.Calc/Formula/Load"><prop oor:name="ODFRecalcMode" oor:op="fuse"><value>0</value></prop></item>
           <item oor:path="/org.openoffice.Office.Calc/Formula/Load"><prop oor:name="OOXMLRecalcMode" oor:op="fuse"><value>0</value></prop></item>
          </oor:items>
          XCU
          rm -rf _recalc && mkdir _recalc
          soffice --headless --calc --convert-to xlsx --outdir _recalc output/*.xlsx
          cp _recalc/*.xlsx output/
          rm -rf _recalc

      - name: Data en Excel versleutelen
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python encrypt_site.py

      - name: Commit naar main (GitHub Pages deployt dit zelf)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output/
          git diff --staged --quiet || (git commit -m "Amazon data update (SP-API) $(date -u +%Y-%m-%d)" && git push)
